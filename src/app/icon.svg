  <path d="M9.5 13.5L7.8 13" stroke="#c9a96e" stroke-width="0.5"/>
  <path d="M22.5 13.5L24.2 13" stroke="#c9a96e" stroke-width="0.5"/>
  <!-- Nose -->
  <path d="M16 16v2c-.2.4-.7.6-.9.6" stroke="#a67838" stroke-width="0.5" stroke-linecap="round" fill="none"/>
