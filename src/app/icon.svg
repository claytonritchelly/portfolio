  <path d="M21 12.8c-.4-.6-1.4-1-2.5-.8" stroke="#1a1008" stroke-width="1" stroke-linecap="round" fill="none"/>
  <!-- Eyes -->
  <ellipse cx="12.8" cy="14.8" rx="1.2" ry="1.1" fill="#1a1008"/>
  <ellipse cx="19.2" cy="14.8" rx="1.2" ry="1.1" fill="#1a1008"/>
  <circle cx="12.4" cy="14.4" r="0.4" fill="white" opacity="0.7"/>
  <circle cx="18.8" cy="14.4" r="0.4" fill="white" opacity="0.7"/>
  <!-- Glasses rimless - gold frame -->
  <rect x="9.5" y="12.8" width="6.5" height="4.2" rx="1" fill="none" stroke="#c9a96e" stroke-width="0.6"/>
  <rect x="16" y="12.8" width="6.5" height="4.2" rx="1" fill="none" stroke="#c9a96e" stroke-width="0.6"/>
  <!-- Blue lens tint -->
  <rect x="9.8" y="13.1" width="5.9" height="3.6" rx="0.8" fill="#4488ff" opacity="0.1"/>
  <rect x="16.3" y="13.1" width="5.9" height="3.6" rx="0.8" fill="#4488ff" opacity="0.1"/>
