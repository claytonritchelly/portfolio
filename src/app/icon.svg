  <ellipse cx="24.2" cy="15.5" rx="1.5" ry="2" fill="#b07840"/>
  <!-- Hair top -->
  <path d="M7.5 12c0-5.5 3.5-9 8.5-9s8.5 3.5 8.5 9c0 .8-.3 2-.7 2.8.3-3-1-7.5-7.8-7.5S8.2 11.5 8.2 14.8c-.4-.8-.7-2-.7-2.8z" fill="#1c1410"/>
  <path d="M9 9.5C10 5.5 12.5 3 16 3s6 2.5 7 6.5c-1-3.2-3.5-5-7-5S10 6.3 9 9.5z" fill="#0f0c09"/>
